kind = "web"
previewPath = "/"
title = "Palm Grove Service Villa"
version = "1.0.0"
id = "artifacts/palm-grove"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22198

[services.development]
run = "pnpm --filter @workspace/palm-grove run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/palm-grove", "run", "build" ]
publicDir = "artifacts/palm-grove/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22198"
BASE_PATH = "/"
